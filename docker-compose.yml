version: "3.9"

services:
  whatsapp-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-chatbot
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      # Persist WhatsApp session & config between restarts
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
